version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shopify_analytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI App ───────────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker — Webhook queue (high priority) ─────────────────────
  celery-webhooks:
    build: .
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --queues=webhooks
      --concurrency=4
      --loglevel=info
      --hostname=webhooks@%h
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker — Bulk sync queue (low priority, long-running) ───────
  celery-bulk:
    build: .
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --queues=bulk
      --concurrency=2
      --loglevel=info
      --hostname=bulk@%h
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Beat (scheduler for incremental sync) ──────────────────────
  celery-beat:
    build: .
    command: >
      celery -A app.workers.celery_app.celery_app beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
    env_file: .env
    volumes:
      - .:/app
      - celerybeat_data:/app/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Flower — Celery monitoring UI ─────────────────────────────────────
  flower:
    build: .
    command: >
      celery -A app.workers.celery_app.celery_app flower
      --port=5555
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  celerybeat_data:
